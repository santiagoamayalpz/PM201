<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Practica 2 - Caja</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <div class="container my-5">
        <h1 class="text-center mb-4 text-primary">Práctica No. 2: Reto General</h1>
        
        <div class="row g-4">
            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-dark text-white">
                        <h4 class="mb-0">Productos Disponibles</h4>
                    </div>
                    <div class="card-body">
                        <div id="contenedor-productos" class="list-group"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card h-100 shadow-sm">
                    <div class="card-header bg-success text-white d-flex justify-content-between align-items-center">
                        <h4 class="mb-0">Pedidos del Cliente</h4>
                        <span id="total-badge" class="badge bg-light text-dark fs-5">$0</span>
                    </div>
                    <div class="card-body">
                        <ul id="contenedor-pedidos" class="list-group list-group-flush mb-3"></ul>
                        <div class="text-end mt-3">
                            <h5 class="text-muted">Total Acumulado: <span id="total-texto" class="text-success fw-bold">$0</span></h5>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="logicacaja.js"></script>
</body>
</html>
